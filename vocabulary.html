<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Daily French 🥖 — Vocabulary</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/vocabulary.css">
</head>
<body>

  <!-- Notification éphémère -->
  <div id="toast" class="toast"></div>

  <!-- Modal : création / sélection de joueur -->
  <div id="modalWrap" class="modal-wrap">
    <div class="modal">
      <h3 id="modalTitle">New Player</h3>
      <input type="text" id="mInput" maxlength="30" placeholder="Your name" autocapitalize="off" autocomplete="off">
      <div class="modal-actions">
        <button id="btnCancelModal" class="btn-ghost">Cancel</button>
        <button id="btnCreatePlayer" class="btn-primary">Create</button>
      </div>
    </div>
  </div>

  <!-- Popup de définition d'un mot -->
  <div id="vocabulary-popup-modal" class="vocab-popup-modal">
    <div class="vocab-popup-content">
      <button class="vocab-popup-close" onclick="if(typeof closeVocabPopup==='function')closeVocabPopup()">×</button>
      <div id="vocab-popup-body"></div>
    </div>
  </div>

  <!-- Navigation bottom fixe -->
  <nav class="nav-bottom">
    <a href="dashboard.html" class="nav-item">🏠<<span>Home</span></a>
    <a href="quiz.html?section=lecons" class="nav-item">📚<<span>Lessons</span></a>
    <a href="quiz.html?section=levels" class="nav-item">🎮<<span>Play</span></a>
    <a href="vocabulary.html" class="nav-item">📖<<span>Vocab</span></a>
    <a href="dashboard.html" class="nav-item">📊<<span>Space</span></a>
  </nav>

  <!-- Hero : identité du joueur -->
  <header class="hero">
    <div class="hero-avatar" id="heroAv">?
      <span class="hero-lvl-badge" id="heroLvl">1</span>
    </div>
    <div class="hero-info">
      <div class="hero-name" id="heroName">Guest</div>
      <div class="hero-tag" id="heroTag">Level 1 · 0 pts · 0/20 levels</div>
    </div>
    <div class="hero-xp">
      <div class="xp-bar"><div class="xp-fill" id="xpBar"></div></div>
      <div class="xp-text"><span id="xpNow">0</span> pts · Next: <span id="xpGoal">100</span> pts</div>
    </div>
    <div class="hero-switch">
      <select id="selPlayer" onchange="if(this.value&&typeof loadPlayer==='function'){loadPlayer(this.value)}">
        <option value="">Choose a player</option>
      </select>
    </div>
  </header>

  <!-- Bento : 3 tuiles stats joueur (mêmes IDs que core.js) -->
  <div class="bento-grid">
    <div class="bento-tile">
      <div class="bento-num" id="b1">1</div>
      <div class="bento-label">Level</div>
    </div>
    <div class="bento-tile">
      <div class="bento-num" id="b2">0</div>
      <div class="bento-label">Points</div>
    </div>
    <div class="bento-tile">
      <div class="bento-num" id="b3">0/20</div>
      <div class="bento-label">Done</div>
    </div>
  </div>

  <!-- Section principale : lexique -->
  <section id="vocabSection" class="section active">
    <h2 class="section-title">📖 Vocabulary</h2>

    <!-- Barre d'outils : recherche + filtres -->
    <div class="vocab-toolbar">
      <input type="text" id="vocabSearch" placeholder="Search French or English…" autocapitalize="off" autocomplete="off">
      <select id="vocabFilterLevel">
        <option value="">All levels</option>
      </select>
      <select id="vocabFilterCat">
        <option value="">All categories</option>
      </select>
    </div>

    <!-- Compteur de résultats -->
    <div class="vocab-meta"><span id="vocabCount">0</span> words</div>

    <!-- Grille des mots -->
    <div id="vocabGrid" class="vocab-grid"></div>
  </section>

  <!-- Chargement JS : ordre critique -->
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/vocabulary-data.js"></script>
  <script src="js/vocabulary-engine.js"></script>
  <script src="js/core.js"></script>
  <script src="js/ui-utils.js"></script>
  <script src="js/vocabulary.js"></script>

</body>
</html>
